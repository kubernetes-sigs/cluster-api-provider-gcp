  name: "${CLUSTER_NAME}-crs-ccm"
data:
  gce-ccm-external.yaml: |
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      creationTimestamp: null
      labels:
        addon.kops.k8s.io/name: gcp-cloud-controller.addons.k8s.io
        component: cloud-controller-manager
        k8s-addon: gcp-cloud-controller.addons.k8s.io
      name: cloud-controller-manager
      namespace: kube-system
    spec:
      selector:
        matchLabels:
          component: cloud-controller-manager
      template:
        metadata:
          labels:
            component: cloud-controller-manager
            tier: control-plane
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: Exists
                  - matchExpressions:
                      - key: node-role.kubernetes.io/master
                        operator: Exists
          containers:
          - args:
            - --allocate-node-cidrs=true
            - --cidr-allocator-type=RangeAllocator
            - --cluster-cidr=192.168.0.0/16
            - --cluster-name=${CLUSTER_NAME}
            - --controllers=*
            - --leader-elect=true
            - --v=4
            - --cloud-provider=gce
            - --use-service-account-credentials=true
            - --cloud-config=/etc/kubernetes/cloud.config
            image: gcr.io/k8s-staging-cloud-provider-gcp/cloud-controller-manager:master
            imagePullPolicy: IfNotPresent
            livenessProbe:
              failureThreshold: 3
              httpGet:
                host: 127.0.0.1
                path: /healthz
                port: 10258
                scheme: HTTPS
              initialDelaySeconds: 15
              periodSeconds: 10
              successThreshold: 1
              timeoutSeconds: 15
            name: cloud-controller-manager
            resources:
              requests:
                cpu: 200m
            volumeMounts:
              - mountPath: /etc/kubernetes/cloud.config
                name: cloudconfig
                readOnly: true
          hostNetwork: true
          nodeSelector: null
          priorityClassName: system-cluster-critical
          serviceAccountName: cloud-controller-manager
          tolerations:
          - effect: NoSchedule
            key: node.cloudprovider.kubernetes.io/uninitialized
            value: "true"
          - effect: NoSchedule
            key: node.kubernetes.io/not-ready
          - effect: NoSchedule
            key: node-role.kubernetes.io/master
          - effect: NoSchedule
            key: node-role.kubernetes.io/control-plane
          volumes:
          - hostPath:
              path: /etc/kubernetes/cloud.config
              type: FileOrCreate
            name: cloudconfig
      updateStrategy:
        type: RollingUpdate
